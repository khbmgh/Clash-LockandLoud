mixed-port: 7890
allow-lan: true
mode: rule
log-level: silent
ipv6: false
tcp-concurrent: true
unified-delay: true
global-client-fingerprint: chrome
keep-alive-idle: 60
keep-alive-interval: 30
profile:
  store-selected: true
  store-fake-ip: true
  battery-saving:
    auto-interval:
      proxy-provider: 43200
      url-test: 1800

# ================= DNS =================
dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.ir"
    - "*.shaparak.ir"
    - "*.localhost"
    - "*.lan"
    - "*.local"

  respect-rules: true

  proxy-server-nameserver:
    - https://8.8.8.8/dns-query       # Google DoH — IP
    - https://1.1.1.1/dns-query       # Cloudflare DoH — IP

  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
    - 9.9.9.9

  nameserver-policy:
    "rule-set:iran_domain":
      - https://dns.arvancloud.ir/dns-query
      - 178.22.122.100
    "+.ir":
      - https://dns.arvancloud.ir/dns-query
      - 178.22.122.100

  nameserver:
    - https://94.140.14.14/dns-query  # AdGuard DoH — IP 
    - https://8.8.8.8/dns-query       # Google DoH — IP 

  fallback:
    - https://1.0.0.1/dns-query       
    - tls://9.9.9.9                  
    - tls://8.8.4.4                  

  fallback-filter:
    geoip: true
    geoip-code: IR
    ipcidr:
      - 240.0.0.0/4
      - 10.0.0.0/8  
      - 127.0.0.0/8
      - 192.168.0.0/16
    domain:
      - '+.google.com'
      - '+.youtube.com'
      - '+.workers.dev'


# ================= TUN & Sniffer =================
tun:
  enable: true
  stack: system
  dns-hijack: ["any:53"]
  auto-route: true
  auto-detect-interface: true

sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    TLS: {ports: [443, 8443]}
    QUIC: {ports: [443, 8443]}
    HTTP: {ports: [80, 8080-8880]}

# ================= Proxy Providers =================
proxy-providers:
  Mr_afxoni_All:
    type: http
    url: "https://raw.githubusercontent.com/khbmgh/Clash-LockandLoud/main/all.yaml"
    interval: 43200
    path: ./proxy-providers/all_workers.yaml
    health-check: {enable: true, interval: 1800, url: https://cp.cloudflare.com/generate_204}
    override: {udp: true, skip-cert-verify: true}

# ================= Proxy Groups =================
proxy-groups:
  - name: 🚀 MR_Afxoni_Main
    type: select
    proxies:
      - 🔍 All-Speed-Test
      - 🛠️ Manual-Protocol-Selection
      - 🧩 Sudoku-Speed-Test
      - 👁️ Mieru-Speed-Test
      - 💨 ShadowQUIC-Speed-Test
      - 🟣 VLESS-Speed-Test
      - 🔵 VMESS-Speed-Test
      - 🟠 Hysteria2-Speed-Test
      - 🔴 Trojan-Speed-Test
      - 🟡 Shadowsocks-Speed-Test
      - ⚪ WireGuard-Speed-Test
      - 🔷 TUIC-Speed-Test
      - 🟤 AnyTLS-Speed-Test
      - ⬛ HTTP-SOCKS-SSH-Speed-Test
      - ⚖️ Worker-Load-Balance
      - 🔄 Worker-Fallback-Mode
      - 🔄 Fallback-All      
      - 🟢 DIRECT-REAL

  - name: 🔍 All-Speed-Test
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    tolerance: 100
    lazy: true
    use: [Mr_afxoni_All]

  - name: 🛠️ Manual-Protocol-Selection
    type: select
    use: [Mr_afxoni_All]

  - name: 🧩 Sudoku-Speed-Test
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    tolerance: 100
    lazy: true
    use: [Mr_afxoni_All]
    filter: "(?i)sudoku"

  - name: 👁️ Mieru-Speed-Test
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    tolerance: 100
    lazy: true
    use: [Mr_afxoni_All]
    filter: "(?i)mieru"

  - name: 💨 ShadowQUIC-Speed-Test
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    tolerance: 100
    lazy: true
    use: [Mr_afxoni_All]
    filter: "(?i)shadowquic"

  - name: 🟣 VLESS-Speed-Test
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    tolerance: 50
    lazy: true
    use: [Mr_afxoni_All]
    filter: "(?i)vless"

  - name: 🔵 VMESS-Speed-Test
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    tolerance: 100
    lazy: true
    use: [Mr_afxoni_All]
    filter: "(?i)vmess"

  - name: 🟠 Hysteria2-Speed-Test
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    tolerance: 100
    lazy: true
    use: [Mr_afxoni_All]
    filter: "(?i)hy2|hysteria2|hysteria"

  - name: 🔴 Trojan-Speed-Test
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    tolerance: 100
    lazy: true
    use: [Mr_afxoni_All]
    filter: "(?i)trojan"

  - name: 🟡 Shadowsocks-Speed-Test
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    tolerance: 100
    lazy: true
    use: [Mr_afxoni_All]
    filter: "^ss "

  - name: ⚪ WireGuard-Speed-Test
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    tolerance: 100
    lazy: true
    use: [Mr_afxoni_All]
    filter: "(?i)wg|wireguard"

  - name: 🔷 TUIC-Speed-Test
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    tolerance: 100
    lazy: true
    use: [Mr_afxoni_All]
    filter: "(?i)tuic"

  - name: 🟤 AnyTLS-Speed-Test
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    tolerance: 100
    lazy: true
    use: [Mr_afxoni_All]
    filter: "(?i)anytls"

  - name: ⬛ HTTP-SOCKS-SSH-Speed-Test
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    tolerance: 100
    lazy: true
    use: [Mr_afxoni_All]
    filter: "(?i)\\bhttp\\b|\\bsocks\\b|\\bssh\\b"

  - name: ⚖️ Worker-Load-Balance
    type: load-balance
    strategy: consistent-hashing
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    lazy: true
    use: [Mr_afxoni_All]

  - name: 🔄 Worker-Fallback-Mode
    type: fallback
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    lazy: true
    use: [Mr_afxoni_All]

  - name: 🔄 Fallback-All
    type: fallback
    url: https://cp.cloudflare.com/generate_204
    interval: 1800
    lazy: true
    use: [Mr_afxoni_All]

  - name: 🟢 DIRECT-REAL
    type: select
    proxies: [DIRECT]

# ================= Rule Providers =================
rule-providers:
  # لیست دامنه‌های ایرانی (سایت‌های داخلی)
  karing_geosite_ir:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/KaringX/Iran-sing-box-rules/rule-set/mihomo/geosite-ir.mrs"
    path: ./rule-providers/geosite-ir.mrs
    interval: 86400

  # لیست آی‌پی‌های ایران
  karing_geoip_ir:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://raw.githubusercontent.com/KaringX/Iran-sing-box-rules/rule-set/mihomo/geoip-ir.mrs"
    path: ./rule-providers/geoip-ir.mrs
    interval: 86400

  # لیست تبلیغات ایرانی (برای مسدودسازی)
  karing_ads_ir:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/KaringX/Iran-sing-box-rules/rule-set/mihomo/geosite-category-ads-ir.mrs"
    path: ./rule-providers/ads-ir.mrs
    interval: 86400

# ================= Rules =================
rules:
  # ۱. جلوگیری از نشت ترافیک لوکال
  - DOMAIN-SUFFIX,lan,DIRECT
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN-SUFFIX,localhost,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.10.34.0/24,REJECT,no-resolve

  # ۲. بلاک کردن تبلیغات (صرفه‌جویی در پهنای باند و سرعت)
  - RULE-SET,karing_ads_ir,REJECT

  # ۳. مسیردهی مستقیم دامنه‌های ایرانی
  - DOMAIN-SUFFIX,ir,DIRECT
  - RULE-SET,karing_geosite_ir,DIRECT

  # ۴. مسیردهی مستقیم آی‌پی‌های ایرانی (بدون نیاز به ریزالو مجدد)
  - RULE-SET,karing_geoip_ir,DIRECT,no-resolve
  - GEOIP,IR,DIRECT

  # ۵. ارسال مابقی ترافیک به سمت پروکسی
  - MATCH,🚀 MR_Afxoni_Main
